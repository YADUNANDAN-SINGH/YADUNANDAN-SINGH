name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */12 * * *" # Run every 12 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Fetch and Modify Stats SVG
        run: |
          curl -s "https://github-readme-stats.shion.dev/api?username=YADUNANDAN-SINGH&show_icons=true&hide_border=true&bg_color=00000000&title_color=667eea&icon_color=764ba2&text_color=8b95c9&ring_color=667eea" > stats.svg
          # Replace the rank text with a perfectly centered fire SVG icon
          python3 -c "
          import re
          with open('stats.svg', 'r') as f:
              svg = f.read()
          fire = '''<g class=\"rank-text\">
            <svg x=\"-16\" y=\"-11.5\" width=\"22\" height=\"29\" viewBox=\"0 0 384 512\" fill=\"#FFA500\">
              <path d=\"M216 23.86c0-23.8-30.65-32.77-44.15-13.04C48 191.85 224 200 224 288c0 35.63-29.11 64.46-64.85 63.99-35.17-.45-63.15-29.77-63.15-64.94v-85.51c0-21.7-26.47-32.23-41.43-16.5C27.8 213.16 0 261.33 0 320c0 105.87 86.13 192 192 192s192-86.13 192-192c0-170.29-168-193-168-296.14z\"/>
            </svg>
          </g>'''
          svg = re.sub(r'<g class=\"rank-text\">.*?</g>\s*</g>', fire + '\n      </g>', svg, flags=re.DOTALL)
          with open('stats.svg', 'w') as f:
              f.write(svg)
          "
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add stats.svg
          git commit -m "Update GitHub stats SVG" || exit 0
          git push
